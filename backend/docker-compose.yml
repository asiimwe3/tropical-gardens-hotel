services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tropical_gardens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tropical_gardens
    ports:
      - "4000:4000"
    depends_on:
      - postgres
volumes:
  pgdata:
